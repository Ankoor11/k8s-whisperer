apiVersion: v1
kind: Pod
metadata:
  name: pending-test
  namespace: default
  labels:
    app: pending-test
    scenario: k8swhisperer-test
spec:
  containers:
    - name: nginx
      image: nginx:latest
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
  nodeSelector:
    gpu: "true"   # No node has this label in minikube — pod stays Pending indefinitely
