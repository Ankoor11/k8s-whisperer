apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-test
  namespace: default
  labels:
    app: oom-test
    scenario: k8swhisperer-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-test
  template:
    metadata:
      labels:
        app: oom-test
    spec:
      containers:
        - name: oom-test
          image: polinux/stress
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
          resources:
            limits:
              memory: "32Mi"   # Will be OOMKilled — allocation 200M > limit 32Mi
              cpu: "200m"
